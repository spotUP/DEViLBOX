name: Build & Deploy DEViLBOX

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'deploy'
  cancel-in-progress: true

jobs:
  # Build for custom server with / base
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # CI-safe tests only. Fixture-dependent parser tests (that read from the
      # local `Reference Music/` tree) still run locally via `npm test`, not here.
      - name: Type check
        run: npm run type-check

      - name: CI regression gate
        run: npm run test:ci

      - name: Effects compliance
        run: npm run test:compliance

      - name: Download CED instrument classifier model
        run: |
          mkdir -p public/models/ced
          curl -L --fail --retry 3 --retry-delay 5 \
            "https://huggingface.co/mispeech/ced-base/resolve/main/model.onnx" \
            -o public/models/ced/model.onnx
          curl -L --fail --retry 3 \
            "https://huggingface.co/mispeech/ced-base/resolve/main/config.json" \
            -o public/models/ced/config.json
          echo "CED model: $(du -sh public/models/ced/model.onnx)"

      - name: Build for custom server
        run: npm run build

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-build
          path: dist/

  # Build Electron desktop apps for all platforms
  electron:
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: win

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        run: npm run build

      - name: Build Electron App
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
        run: npx electron-builder build --${{ matrix.platform }} --publish never

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.platform }}
          path: |
            dist_electron/*.dmg
            dist_electron/*.zip
            dist_electron/*.exe
            dist_electron/*.AppImage
            dist_electron/*.deb
            dist_electron/*.tar.gz
          if-no-files-found: warn

  # Create a GitHub Release with all desktop app binaries + trigger pull-based deploy
  release:
    needs: [build-server]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from package.json
        id: version
        run: echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Download all Electron artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release-assets
          pattern: electron-*
          merge-multiple: true

      - name: Download server build artifact
        uses: actions/download-artifact@v4
        with:
          name: server-build
          path: dist-server/

      - name: Package server build
        run: mkdir -p release-assets && tar -czf release-assets/devilbox-dist.tar.gz -C dist-server/ .

      - name: List release assets
        run: ls -la release-assets/ || echo "No assets found"

      - name: Delete existing latest release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete latest --yes --cleanup-tag || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "DEViLBOX v${{ steps.version.outputs.version }} (Latest Build)"
          body: |
            **Automatically built from the latest `main` branch.**

            This release is updated on every deploy. Download the installer for your platform below.

            | Platform | Files |
            |----------|-------|
            | Windows | `.exe` (installer) or `.zip` (portable) |
            | macOS | `.dmg` (disk image) or `.zip` |
            | Linux | `.AppImage`, `.deb`, or `.tar.gz` |

            ---
            Built from commit ${{ github.sha }}
          files: release-assets/*
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger deploy webhook
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          curl -s -X POST https://devilbox.uprough.net/_webhook/hooks/deploy \
            -H "Content-Type: application/json" \
            -H "X-Deploy-Token: ${DEPLOY_SECRET}" \
            -d '{"sha":"${{ github.sha }}"}' \
            --max-time 30 || echo "Webhook trigger failed (non-fatal)"
