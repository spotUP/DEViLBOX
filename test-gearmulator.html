<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gearmulator WASM Test</title>
  <style>
    body { font-family: monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
    h1 { color: #0ff; }
    .controls { display: flex; gap: 10px; align-items: center; margin: 10px 0; flex-wrap: wrap; }
    button { background: #333; color: #0ff; border: 1px solid #0ff; padding: 6px 14px; cursor: pointer; font-family: monospace; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button:hover:not(:disabled) { background: #0ff; color: #000; }
    select, input[type=file] { background: #222; color: #e0e0e0; border: 1px solid #555; padding: 4px; font-family: monospace; }
    #log { background: #0a0a1a; border: 1px solid #333; padding: 10px; height: 400px; overflow-y: auto; white-space: pre-wrap; font-size: 12px; }
    .ok { color: #0f0; } .warn { color: #ff0; } .error { color: #f44; }
    #meter { width: 300px; height: 20px; background: #111; border: 1px solid #333; }
    #meterFill { height: 100%; background: linear-gradient(90deg, #0f0, #ff0, #f00); width: 0%; transition: width 50ms; }
    label { color: #888; }
  </style>
</head>
<body>
  <h1>Gearmulator WASM Test</h1>

  <div class="controls">
    <label>ROM:</label>
    <select id="romSelect">
      <option value="dist/roms/gearmulator/extracted/Access Virus B (am29f040b_4v9).BIN" data-type="0">Virus B (v4.9)</option>
      <option value="dist/roms/gearmulator/extracted/Access Virus C (am29f040b_6v6).BIN" data-type="0">Virus C (v6.6)</option>
      <option value="dist/roms/gearmulator/extracted/Virus_TI2_FW.bin" data-type="1">Virus TI2</option>
      <option value="dist/roms/gearmulator/extracted/microQ223.BIN" data-type="2">Waldorf microQ (v2.23)</option>
      <option value="xt-interleaved" data-type="3">Waldorf Microwave II/XT (Am29F010 interleaved)</option>
      <option value="dist/roms/gearmulator/extracted/nord-lead-2-27c4001-v104.bin" data-type="4">Nord Lead 2x (v1.04)</option>
      <option value="dist/roms/gearmulator/extracted/jp8000_v1.05.bin" data-type="5">Roland JP-8000 (v1.05)</option>
    </select>
    <input type="file" id="romFile" accept=".bin,.BIN,.rom,.ROM,.syx,.SYX">
    <label>Type:</label>
    <select id="synthType">
      <option value="0">Virus A/B/C (0)</option>
      <option value="1">Virus TI/Snow (1)</option>
      <option value="2">Waldorf microQ (2)</option>
      <option value="3">Waldorf XT (3)</option>
      <option value="4">Nord Lead 2x (4)</option>
      <option value="5">Roland JP-8000 (5)</option>
    </select>
  </div>

  <div class="controls">
    <button id="btnInit">Initialize</button>
    <button id="btnDispose">Dispose</button>
    <span id="initStatus"></span>
    <button id="btnNote" disabled>Play C4</button>
    <button id="btnChord" disabled>Play Chord</button>
    <button id="btnStop" disabled>All Notes Off</button>
    <button id="btnTestAll">Test All Synths</button>
  </div>

  <div class="controls">
    <label>Volume:</label>
    <input type="range" id="volSlider" min="-40" max="6" value="0" step="1">
    <span id="volLabel">0 dB</span>
    <div id="meter"><div id="meterFill"></div></div>
  </div>

  <div class="controls">
    <label>DSP Clock:</label>
    <input type="range" id="clockSlider" min="5" max="100" value="100" step="1">
    <span id="clockLabel">100%</span>
    <span style="color:#888; font-size:11px">(lower = faster render, fewer DSP cycles for MIDI)</span>
  </div>

  <div id="log"></div>

  <script>
    const SAB_HEADER = 16;
    const RING_FRAMES = 8192;
    const SAB_SIZE = SAB_HEADER + RING_FRAMES * 2 * 4;

    const logEl = document.getElementById('log');
    const romSelect = document.getElementById('romSelect');
    const romFile = document.getElementById('romFile');
    const synthType = document.getElementById('synthType');
    const btnInit = document.getElementById('btnInit');
    const initStatus = document.getElementById('initStatus');
    const btnNote = document.getElementById('btnNote');
    const btnChord = document.getElementById('btnChord');
    const btnStop = document.getElementById('btnStop');
    const volSlider = document.getElementById('volSlider');
    const volLabel = document.getElementById('volLabel');
    const meterFill = document.getElementById('meterFill');

    let audioCtx = null;
    let workletNode = null;
    let gainNode = null;
    let analyser = null;
    let dspWorker = null;
    let sab = null;
    let wasmBinary = null;
    let jsCode = null;
    let romData = null;
    let ready = false;

    // Auto-select synth type from ROM dropdown
    romSelect.addEventListener('change', () => {
      const opt = romSelect.options[romSelect.selectedIndex];
      if (opt.dataset.type) synthType.value = opt.dataset.type;
    });

    volSlider.addEventListener('input', () => {
      const db = parseFloat(volSlider.value);
      volLabel.textContent = db + ' dB';
      if (gainNode) gainNode.gain.value = Math.pow(10, db / 20);
    });

    const clockSlider = document.getElementById('clockSlider');
    const clockLabel = document.getElementById('clockLabel');
    clockSlider.addEventListener('input', () => {
      const pct = parseInt(clockSlider.value);
      clockLabel.textContent = pct + '%';
      if (dspWorker) {
        dspWorker.postMessage({ type: 'setClockPercent', percent: pct });
        log(`Clock set to ${pct}%`);
      }
    });

    function log(msg, cls) {
      const ts = new Date().toLocaleTimeString('en-US', { hour12: false, fractionalSecondDigits: 3 });
      const line = document.createElement('div');
      if (cls) line.className = cls;
      line.textContent = `[${ts}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
      console.log(`[Gearmulator Test] ${msg}`);
    }

    async function loadWasmAssets() {
      log('Fetching gearmulator_wasm.wasm...');
      const t0 = performance.now();
      const [wasmResp, jsResp] = await Promise.all([
        fetch('/gearmulator/gearmulator_wasm.wasm'),
        fetch('/gearmulator/gearmulator_wasm.js'),
      ]);
      if (!wasmResp.ok) throw new Error(`WASM fetch failed: ${wasmResp.status}`);
      if (!jsResp.ok) throw new Error(`JS fetch failed: ${jsResp.status}`);

      wasmBinary = await wasmResp.arrayBuffer();
      let code = await jsResp.text();
      // Transform for Worker scope — strip ESM export if present
      code = code
        .replace(/import\.meta\.url/g, "'.'")
        .replace(/export\s+default\s+\w+;?/g, '');
      jsCode = code;
      log(`WASM assets loaded in ${(performance.now()-t0).toFixed(0)}ms (${(wasmBinary.byteLength/1024).toFixed(0)}KB)`, 'ok');
    }

    async function loadRom() {
      if (romFile.files.length > 0) {
        log(`Loading ROM from file: ${romFile.files[0].name}`);
        romData = await romFile.files[0].arrayBuffer();
      } else if (romSelect.value === 'xt-interleaved') {
        // Waldorf XT needs two 128K half-ROMs interleaved into one 256K ROM
        // lower_Am29F010 = HalfRomA (starts C0 00), upper_Am29F010 = HalfRomB (starts DE 00)
        // Interleave: byte from A, byte from B → full ROM starts with C0 DE
        log('Fetching Waldorf XT half-ROMs (Am29F010) and interleaving...');
        const [respA, respB] = await Promise.all([
          fetch('/dist/roms/gearmulator/extracted/lower_Am29F010.bin'),
          fetch('/dist/roms/gearmulator/extracted/upper_Am29F010.bin'),
        ]);
        if (!respA.ok || !respB.ok) throw new Error('XT ROM fetch failed');
        const halfA = new Uint8Array(await respA.arrayBuffer());
        const halfB = new Uint8Array(await respB.arrayBuffer());
        log(`Half-ROMs: A(lower)=${halfA.byteLength/1024}KB, B(upper)=${halfB.byteLength/1024}KB`);
        const full = new Uint8Array(halfA.length + halfB.length);
        for (let i = 0; i < halfA.length; i++) {
          full[i * 2] = halfA[i];
          full[i * 2 + 1] = halfB[i];
        }
        log(`Interleaved ROM: ${full.byteLength/1024}KB, header: ${full[0].toString(16)} ${full[1].toString(16)}`, 'ok');
        romData = full.buffer;
      } else if (romSelect.value) {
        log(`Fetching ROM: ${romSelect.value}...`);
        const resp = await fetch(`/${romSelect.value}`);
        if (!resp.ok) throw new Error(`ROM fetch failed: ${resp.status}`);
        romData = await resp.arrayBuffer();
      } else {
        throw new Error('No ROM selected');
      }
      log(`ROM loaded: ${(romData.byteLength/1024).toFixed(0)}KB`, 'ok');
    }

    // Initialize — Worker + SAB + Worklet architecture
    btnInit.addEventListener('click', async () => {
      try {
        btnInit.disabled = true;
        initStatus.textContent = '⏳ Loading...';

        await loadWasmAssets();
        await loadRom();

        log('Creating AudioContext...');
        audioCtx = new AudioContext({ sampleRate: 44100 });
        if (audioCtx.state === 'suspended') await audioCtx.resume();

        // Create SharedArrayBuffer for audio ring buffer
        sab = new SharedArrayBuffer(SAB_SIZE);
        log(`SharedArrayBuffer created: ${(SAB_SIZE/1024).toFixed(0)}KB (${RING_FRAMES} frames)`);

        log('Loading AudioWorklet module...');
        await audioCtx.audioWorklet.addModule('/gearmulator/Gearmulator.worklet.js');

        log('Creating worklet node (SAB reader)...');
        workletNode = new AudioWorkletNode(audioCtx, 'gearmulator-processor', {
          outputChannelCount: [2],
        });

        gainNode = audioCtx.createGain();
        gainNode.gain.value = Math.pow(10, parseFloat(volSlider.value) / 20);

        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048;

        workletNode.connect(gainNode);
        gainNode.connect(analyser);
        analyser.connect(audioCtx.destination);

        // Send SAB to worklet
        workletNode.port.postMessage({ type: 'setSAB', sab });
        workletNode.port.onmessage = (e) => {
          if (e.data.type === 'underrun' && e.data.count % 200 === 1) {
            log(`Audio underrun #${e.data.count} (avail=${e.data.available}, need=${e.data.needed})`, 'warn');
          }
        };

        // Create DSP Worker
        log('Creating DSP Worker (WASM + pthreads)...');
        dspWorker = new Worker('/gearmulator/Gearmulator.worker.js');

        const readyPromise = new Promise((resolve, reject) => {
          const timeout = setTimeout(() => reject(new Error('Init timeout (60min)')), 60 * 60 * 1000);
          dspWorker.onmessage = (e) => {
            console.log('[Main] Worker message:', e.data);
            if (e.data.type === 'ready') {
              clearTimeout(timeout);
              resolve(e.data);
            } else if (e.data.type === 'error') {
              clearTimeout(timeout);
              log(`✗ Worker error: ${e.data.message}`, 'error');
              reject(new Error(e.data.message));
            }
          };
          dspWorker.onerror = (e) => {
            clearTimeout(timeout);
            log(`✗ Worker onerror: ${e.message}`, 'error');
            reject(new Error(`Worker error: ${e.message}`));
          };
        });

        const st = parseInt(synthType.value);
        log(`Sending init to DSP Worker — synthType=${st}, sampleRate=${audioCtx.sampleRate}...`);
        const initStart = performance.now();

        dspWorker.postMessage({
          type: 'init',
          sampleRate: audioCtx.sampleRate,
          wasmBinary,
          jsCode,
          romData,
          synthType: st,
          sab,
        });

        const result = await readyPromise;
        const elapsed = ((performance.now() - initStart) / 1000).toFixed(1);
        log(`✓ Device ready! sampleRate=${result.sampleRate}, handle=${result.handle} (${elapsed}s)`, 'ok');

        // Set resample ratio if DSP rate differs from audio context rate
        if (result.sampleRate && result.sampleRate !== audioCtx.sampleRate) {
          const ratio = result.sampleRate / audioCtx.sampleRate;
          workletNode.port.postMessage({ type: 'setResampleRatio', ratio });
          log(`Resample ratio: ${ratio.toFixed(4)} (${result.sampleRate} → ${audioCtx.sampleRate})`, 'ok');
        }

        ready = true;
        initStatus.textContent = '✅ Ready';
        btnNote.disabled = false;
        btnChord.disabled = false;
        btnStop.disabled = false;
        btnScan.disabled = false;
        btnCC.disabled = false;
        startMeter();
        startSABMonitor();

      } catch (err) {
        log(`✗ Init failed: ${err}`, 'error');
        initStatus.textContent = '❌ Failed';
        btnInit.disabled = false;
      }
    });

    function sendMidi(type, data) {
      if (dspWorker) dspWorker.postMessage({ type, ...data });
    }

    btnNote.addEventListener('click', () => {
      // Send program change 0 first (ensure a valid patch is loaded)
      sendMidi('programChange', { program: 0, channel: 0 });
      log('Sent Program Change 0 on ch 0');
      // Then send CC7 (volume) = 127
      sendMidi('cc', { cc: 7, value: 127, channel: 0 });
      log('Sent CC7 (Volume) = 127 on ch 0');
      // Then send note
      setTimeout(() => {
        sendMidi('noteOn', { note: 60, velocity: 127, channel: 0 });
        log('Note On: C4 (60) vel=127 ch=0 — NO auto note-off (use All Notes Off)');
      }, 500);
    });

    btnChord.addEventListener('click', () => {
      [60, 64, 67].forEach(n => sendMidi('noteOn', { note: n, velocity: 100, channel: 0 }));
      log('Chord: C4 E4 G4');
      setTimeout(() => {
        [60, 64, 67].forEach(n => sendMidi('noteOff', { note: n, channel: 0 }));
        log('Chord off');
      }, 2000);
    });

    btnStop.addEventListener('click', () => {
      for (let ch = 0; ch < 16; ch++)
        for (let n = 0; n < 128; n++) sendMidi('noteOff', { note: n, channel: ch });
      log('All notes off (all channels)');
    });

    // Send ONLY a single CC message (no note) to test if any MIDI kills audio
    const btnCC = document.createElement('button');
    btnCC.textContent = 'CC Only';
    btnCC.title = 'Send only CC7=127 on ch0 (no note) — tests if any MIDI kills audio';
    btnCC.disabled = true;
    document.querySelector('.controls:nth-child(2)').appendChild(btnCC);
    btnCC.addEventListener('click', () => {
      sendMidi('cc', { cc: 7, value: 127, channel: 0 });
      log('Sent ONLY CC7=127 on ch0 — watch if audio dies', 'warn');
    });

    // Channel scan: try sending Note On on all 16 channels to find which one works
    const btnScan = document.createElement('button');
    btnScan.textContent = 'Ch Scan';
    btnScan.title = 'Send Note On C4 on all 16 MIDI channels to find which works';
    btnScan.disabled = true;
    document.querySelector('.controls:nth-child(2)').appendChild(btnScan);
    btnScan.addEventListener('click', () => {
      log('--- MIDI Channel Scan: sending C4 vel=127 on all 16 channels ---', 'ok');
      for (let ch = 0; ch < 16; ch++) {
        sendMidi('programChange', { program: 0, channel: ch });
        sendMidi('cc', { cc: 7, value: 127, channel: ch });
        sendMidi('noteOn', { note: 60, velocity: 127, channel: ch });
      }
      log('All 16 channels triggered — watch peak level');
    });

    // Note: btnScan.disabled is cleared below when ready=true

    // Dispose current synth
    document.getElementById('btnDispose').addEventListener('click', () => {
      if (dspWorker) {
        dspWorker.postMessage({ type: 'dispose' });
        dspWorker.terminate();
        dspWorker = null;
      }
      if (workletNode) { workletNode.disconnect(); workletNode = null; }
      if (gainNode) { gainNode.disconnect(); gainNode = null; }
      if (analyser) { analyser.disconnect(); analyser = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      ready = false;
      btnInit.disabled = false;
      btnNote.disabled = true;
      btnChord.disabled = true;
      btnStop.disabled = true;
      initStatus.textContent = '';
      log('Disposed.', 'warn');
    });

    // Test All Synths — sequential test of each synth type
    document.getElementById('btnTestAll').addEventListener('click', async () => {
      const synths = [
        { name: 'Virus B', rom: 'dist/roms/gearmulator/extracted/Access Virus B (am29f040b_4v9).BIN', type: 0 },
        // TI2 and XT skipped — dual-DSP/MC68K boot too slow in interpreter mode (5-10+ min)
        // { name: 'Virus TI2', rom: 'dist/roms/gearmulator/extracted/Virus_TI2_FW.bin', type: 1 },
        // XT/Nord boot takes 30+ min in WASM interpreter mode (need pre-boot snapshots)
        // microQ has snapshot — should boot fast now
        { name: 'Waldorf microQ', rom: 'dist/roms/gearmulator/extracted/microQ223.BIN', type: 2 },
        // { name: 'Waldorf XT', rom: 'xt-interleaved', type: 3 },
        // { name: 'Nord Lead 2x', rom: 'dist/roms/gearmulator/extracted/nord-lead-2-27c4001-v104.bin', type: 4 },
        { name: 'Roland JP-8000', rom: 'dist/roms/gearmulator/extracted/jp8000_v1.05.bin', type: 5 },
      ];

      log('=== TEST ALL SYNTHS ===', 'ok');

      for (const s of synths) {
        log(`\n--- Testing ${s.name} (type=${s.type}) ---`);
        let w = null, wn = null, gn = null, ctx = null;
        try {
          // Load ROM (handle XT interleaving specially)
          let rom;
          if (s.rom === 'xt-interleaved') {
            const [respA, respB] = await Promise.all([
              fetch('/dist/roms/gearmulator/extracted/lower_Am29F010.bin'),
              fetch('/dist/roms/gearmulator/extracted/upper_Am29F010.bin'),
            ]);
            if (!respA.ok || !respB.ok) { log('XT ROM fetch failed', 'error'); continue; }
            const halfA = new Uint8Array(await respA.arrayBuffer());
            const halfB = new Uint8Array(await respB.arrayBuffer());
            const full = new Uint8Array(halfA.length + halfB.length);
            for (let i = 0; i < halfA.length; i++) {
              full[i * 2] = halfA[i];
              full[i * 2 + 1] = halfB[i];
            }
            rom = full.buffer;
            log(`ROM: interleaved ${halfA.length/1024}K + ${halfB.length/1024}K = ${full.length/1024}KB`);
          } else {
            const resp = await fetch('/' + s.rom);
            if (!resp.ok) { log(`ROM fetch failed: ${resp.status}`, 'error'); continue; }
            rom = await resp.arrayBuffer();
          }
          log(`ROM: ${(rom.byteLength/1024).toFixed(0)}KB`);

          // Load WASM if not cached
          if (!wasmBinary) await loadWasmAssets();

          // Create audio context
          ctx = new AudioContext({ sampleRate: 44100 });
          if (ctx.state === 'suspended') await ctx.resume();

          const testSab = new SharedArrayBuffer(SAB_SIZE);
          await ctx.audioWorklet.addModule('/gearmulator/Gearmulator.worklet.js');
          wn = new AudioWorkletNode(ctx, 'gearmulator-processor', { outputChannelCount: [2] });
          wn.port.postMessage({ type: 'setSAB', sab: testSab });

          gn = ctx.createGain();
          wn.connect(gn);
          gn.connect(ctx.destination);

          w = new Worker('/gearmulator/Gearmulator.worker.js');

          const result = await new Promise((resolve, reject) => {
            const initTimeoutMs = (s.type === 2 || s.type === 3 || s.type === 4) ? 900000 : 60000; // 15 min for slow synths
            const to = setTimeout(() => reject(new Error(`Init timeout (${initTimeoutMs/1000}s)`)), initTimeoutMs);
            w.onmessage = (e) => {
              if (e.data.type === 'ready') { clearTimeout(to); resolve(e.data); }
              else if (e.data.type === 'booting') { log(`Booting... (${e.data.elapsed ? (e.data.elapsed/1000).toFixed(0) + 's' : 'started'})`, 'warn'); }
              else if (e.data.type === 'error') { clearTimeout(to); reject(new Error(e.data.message)); }
            };
            w.onerror = (e) => { clearTimeout(to); reject(new Error(e.message)); };
            w.postMessage({ type: 'init', sampleRate: 44100, wasmBinary, romData: rom, synthType: s.type, sab: testSab });
          });

          log(`INIT OK: sampleRate=${result.sampleRate}, handle=${result.handle}`, 'ok');

          // Set resample ratio if needed
          if (result.sampleRate && result.sampleRate !== 44100) {
            const ratio = result.sampleRate / 44100;
            wn.port.postMessage({ type: 'setResampleRatio', ratio });
          }

          // Send a note and wait for audio
          w.postMessage({ type: 'noteOn', note: 60, velocity: 127, channel: 0 });
          log('Sent Note On C4 vel=127');

          // Wait 5 seconds and check SAB for non-zero audio
          await new Promise(r => setTimeout(r, 5000));

          const testF32 = new Float32Array(testSab);
          const testI32 = new Int32Array(testSab);
          const wp = Atomics.load(testI32, 0);
          const rp = Atomics.load(testI32, 1);
          let used = wp - rp; if (used < 0) used += RING_FRAMES;

          // Check ring buffer data for current non-zero audio
          let ringPeak = 0;
          for (let i = 4; i < testF32.length; i++) {
            const v = Math.abs(testF32[i]);
            if (v > ringPeak) ringPeak = v;
          }

          // Also read the worker's running peak from SAB slot 3 (stored as int * 1000)
          const workerPeakInt = Atomics.load(testI32, 3);
          const workerPeak = workerPeakInt / 1000;
          const peak = Math.max(ringPeak, workerPeak);

          if (peak > 0.001) {
            log(`AUDIO OK: peak=${peak.toFixed(6)} (ring=${ringPeak.toFixed(6)}, worker=${workerPeak.toFixed(3)}), used=${used} frames`, 'ok');
          } else if (wp > 0) {
            log(`AUDIO SILENT: write=${wp} read=${rp}, ringPeak=${ringPeak.toFixed(6)}, workerPeak=${workerPeak.toFixed(3)}`, 'warn');
          } else {
            log(`NO AUDIO: writePos=${wp}, buffer empty`, 'error');
          }

          // Cleanup success path
          w.postMessage({ type: 'noteOff', note: 60, channel: 0 });
          await new Promise(r => setTimeout(r, 200));
          w.postMessage({ type: 'dispose' });
          log(`${s.name} test complete.`);

        } catch (err) {
          log(`${s.name} FAILED: ${err}`, 'error');
        } finally {
          // Always clean up resources — especially important on timeout
          try { if (w) w.terminate(); } catch {}
          try { if (wn) wn.disconnect(); } catch {}
          try { if (gn) gn.disconnect(); } catch {}
          try { if (ctx) await ctx.close(); } catch {}
          w = null; wn = null; gn = null; ctx = null;
          // Brief pause to let resources be freed
          await new Promise(r => setTimeout(r, 500));
        }
      }
      log('\n=== ALL TESTS COMPLETE ===', 'ok');
    });

    function startSABMonitor() {
      // Monitor SAB ring buffer from main thread — bypasses worker event loop blocking
      const sabInt32 = new Int32Array(sab);
      const sabFloat32 = new Float32Array(sab);
      let monitorCount = 0;
      const monitor = setInterval(() => {
        const writePos = Atomics.load(sabInt32, 0);
        const readPos = Atomics.load(sabInt32, 1);
        const bufSize = Atomics.load(sabInt32, 2);
        let used = writePos - readPos;
        if (used < 0) used += bufSize;

        // Sample a few floats near writePos to check for non-zero audio
        let peak = 0;
        const audioOffset = 4; // HEADER_INTS
        if (writePos > 0) {
          const checkStart = ((writePos - 128 + bufSize) % bufSize);
          for (let i = 0; i < 128; i++) {
            const frameIdx = (checkStart + i) % bufSize;
            const idx = audioOffset + frameIdx * 2;
            const v = Math.abs(sabFloat32[idx]);
            if (v > peak) peak = v;
          }
        }

        const cls = peak > 0.001 ? 'ok' : (used > 0 ? 'warn' : 'error');
        log(`[SAB] write=${writePos} read=${readPos} used=${used}/${bufSize} peak=${peak.toFixed(6)}`, cls);

        monitorCount++;
        if (monitorCount > 30) clearInterval(monitor); // stop after ~30s
      }, 1000);
    }

    function startMeter() {
      const buf = new Uint8Array(analyser.frequencyBinCount);
      function tick() {
        analyser.getByteTimeDomainData(buf);
        let peak = 0;
        for (let i = 0; i < buf.length; i++) {
          const s = Math.abs(buf[i] - 128) / 128;
          if (s > peak) peak = s;
        }
        meterFill.style.width = (peak * 100) + '%';
        if (ready) requestAnimationFrame(tick);
      }
      tick();
    }
  </script>
</body>
</html>
