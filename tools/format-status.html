<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEViLBOX Format Status Tracker</title>
<style>
  :root { --bg: #1a1a2e; --card: #16213e; --border: #0f3460; --accent: #e94560; --text: #eee; --dim: #888; --green: #4ade80; --yellow: #fbbf24; --red: #f87171; --blue: #60a5fa; --purple: #c084fc; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: var(--bg); color: var(--text); padding: 20px; font-size: 13px; }
  h1 { color: var(--accent); margin-bottom: 4px; font-size: 22px; }
  .subtitle { color: var(--dim); margin-bottom: 16px; font-size: 12px; }
  .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .controls input, .controls select { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 6px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
  .controls input { width: 260px; }
  .controls select { cursor: pointer; }
  button { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: bold; }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--border); }
  .stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; min-width: 100px; }
  .stat-val { font-size: 20px; font-weight: bold; }
  .stat-label { font-size: 11px; color: var(--dim); }
  .family-group { margin-bottom: 24px; }
  .family-header { background: var(--border); color: var(--text); padding: 8px 12px; border-radius: 6px 6px 0 0; font-weight: bold; display: flex; justify-content: space-between; cursor: pointer; user-select: none; }
  .family-header:hover { background: #1a4a80; }
  .family-count { color: var(--dim); font-weight: normal; }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  th { background: var(--card); color: var(--dim); text-align: left; padding: 6px 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; position: sticky; top: 0; overflow: hidden; text-overflow: ellipsis; }
  td { padding: 5px 8px; border-bottom: 1px solid #1a2a4a; vertical-align: middle; overflow: hidden; text-overflow: ellipsis; }
  tr:hover td { background: rgba(233,69,96,0.05); }
  .fmt-label { font-weight: bold; white-space: nowrap; }
  .fmt-key { color: var(--dim); font-size: 11px; }
  .ext { color: var(--blue); font-size: 11px; }
  .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 3px; }
  .badge-native { background: #1a4a2e; color: var(--green); }
  .badge-uade { background: #4a3a1a; color: var(--yellow); }
  .badge-openmpt { background: #1a2a4a; color: var(--blue); }
  .badge-nativeonly { background: #3a1a4a; color: var(--purple); }
  .badge-editable { background: #1a3a1a; color: #86efac; }
  .badge-exportable { background: #2a1a3a; color: #d8b4fe; }
  select.status-select { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 3px 6px; border-radius: 3px; font-family: inherit; font-size: 12px; cursor: pointer; width: 130px; }
  select.status-select.s-works { border-color: var(--green); color: var(--green); }
  select.status-select.s-partial { border-color: var(--yellow); color: var(--yellow); }
  select.status-select.s-broken { border-color: var(--red); color: var(--red); }
  select.status-select.s-silent { border-color: #f97316; color: #f97316; }
  select.status-select.s-wrong-synth { border-color: var(--purple); color: var(--purple); }
  select.status-select.s-crashes { border-color: #ef4444; color: #ef4444; font-weight: bold; }
  select.status-select.s-untested { border-color: var(--border); color: var(--dim); }
  select.status-select.s-retest { border-color: #22d3ee; color: #22d3ee; font-weight: bold; background: #0a2a3a; }
  input.notes-input { background: var(--card); color: var(--text); border: 1px solid var(--border); padding: 3px 6px; border-radius: 3px; font-family: inherit; font-size: 12px; width: 100%; min-width: 200px; }
  input.notes-input:focus, select.status-select:focus { outline: none; border-color: var(--accent); }
  .hidden { display: none; }
  .export-area { margin-top: 20px; }
  textarea { width: 100%; height: 300px; background: var(--card); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 12px; font-family: inherit; font-size: 12px; resize: vertical; }
  .toast { position: fixed; top: 20px; right: 20px; background: var(--green); color: #000; padding: 10px 20px; border-radius: 6px; font-weight: bold; opacity: 0; transition: opacity 0.3s; z-index: 999; pointer-events: none; }
  .toast.show { opacity: 1; }
  /* Synth Tests section */
  .synth-section { margin-top: 32px; }
  .synth-header { background: #1a2a4a; color: var(--text); padding: 10px 14px; border-radius: 6px 6px 0 0; font-weight: bold; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .synth-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .synth-controls button { padding: 5px 12px; font-size: 11px; }
  .synth-status { font-size: 11px; color: var(--dim); font-weight: normal; }
  .synth-table table { table-layout: auto; }
  .synth-table th, .synth-table td { padding: 5px 10px; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
  .pill-pass { background: #14532d; color: var(--green); }
  .pill-fail { background: #450a0a; color: var(--red); }
  .pill-skip { background: #1c1c1c; color: var(--dim); }
  .synth-stats { display: flex; gap: 12px; flex-wrap: wrap; padding: 8px 12px; background: var(--card); border-top: 1px solid var(--border); }
  .synth-stat-item { font-size: 12px; }
  .running-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--yellow); animation: pulse 1s infinite; margin-right: 6px; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
</style>
</head>
<body>

<h1>🎵 DEViLBOX Format Status Tracker</h1>
<p class="subtitle">188 formats — click a family header to collapse/expand. Server is source of truth. <span id="connectionStatus" style="color:#4ade80">●</span> <span id="connectionText">Connecting...</span></p>

<div class="controls">
  <input type="text" id="search" placeholder="Filter by name, key, or extension...">
  <select id="filterStatus">
    <option value="">All statuses</option>
    <option value="untested">Untested</option>
    <option value="works">Works</option>
    <option value="partial">Partial</option>
    <option value="broken">Broken</option>
    <option value="silent">Silent</option>
    <option value="wrong-synth">Wrong Synth</option>
    <option value="crashes">Crashes</option>
    <option value="retest">Ready for Retest</option>
  </select>
  <select id="filterFamily">
    <option value="">All families</option>
  </select>
  <button onclick="exportJSON()">📋 Export JSON</button>
  <button class="secondary" onclick="exportCSV()">📄 Export CSV</button>
  <button class="secondary" onclick="resetAll()">🗑 Reset All</button>
</div>

<div class="stats" id="stats"></div>
<div id="content"></div>

<!-- Synth Tests Section -->
<div class="synth-section">
  <div class="synth-header">
    <span id="synth-title">🎹 Synth Tests</span>
    <div class="synth-controls">
      <button onclick="runSynthSuite('tone')" id="btn-tone">Tone.js</button>
      <button onclick="runSynthSuite('custom')" id="btn-custom" class="secondary">Custom</button>
      <button onclick="runSynthSuite('all')" id="btn-all" class="secondary">All Synths</button>
      <span class="synth-status" id="synth-run-status"></span>
    </div>
  </div>
  <div id="synth-test-table" class="synth-table"></div>
</div>

<div class="export-area hidden" id="exportArea">
  <textarea id="exportText" readonly></textarea>
</div>
<div class="toast" id="toast">Copied to clipboard!</div>

// Server is the source of truth. We load from server, save incremental updates to server.
let savedState = {};

fetch('/get-data').then(r => r.json()).then(serverData => {
  savedState = serverData || {};
  render();
  updateStats();
  console.log(`[Init] Loaded ${Object.keys(savedState).length} entries from server`);
}).catch(e => {
  console.error('[Init] Failed to load from server:', e);
  document.getElementById('connectionText').textContent = 'Server offline!';
  document.getElementById('connectionStatus').style.color = '#f87171';
});

// SSE — live updates from server (Claude pushes, other browser tabs)
let evtSource = null;
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/events');
  evtSource.addEventListener('connected', () => {
    document.getElementById('connectionStatus').style.color = '#4ade80';
    document.getElementById('connectionText').textContent = 'Connected (live)';
  });
  evtSource.addEventListener('update', (e) => {
    const updates = JSON.parse(e.data);
    applyUpdates(updates);
  });
  evtSource.addEventListener('bulk-update', (e) => {
    const updates = JSON.parse(e.data);
    applyUpdates(updates);
  });
  evtSource.onerror = () => {
    document.getElementById('connectionStatus').style.color = '#f87171';
    document.getElementById('connectionText').textContent = 'Disconnected — retrying...';
  };
}
connectSSE();

function applyUpdates(updates) {
  let count = 0;
  for (const [key, data] of Object.entries(updates)) {
    savedState[key] = data;
    count++;
    // Update DOM directly if row exists (avoid full re-render)
    const row = document.querySelector(`tr[data-key="${key}"]`);
    if (row) {
      const sel = row.querySelector('select');
      if (sel && sel.value !== data.status) {
        sel.value = data.status;
        sel.className = 'status-select ' + statusClass(data.status);
      }
      const inp = row.querySelector('input');
      if (inp && inp !== document.activeElement) {
        inp.value = data.notes || '';
      }
    }
  }
  if (count > 0) {
    updateStats();
    console.log(`[SSE] Applied ${count} updates`);
  }
}

function getState(key) {
  return savedState[key] || { status: 'untested', notes: '' };
}
function setState(key, field, value) {
  if (!savedState[key]) savedState[key] = { status: 'untested', notes: '' };
  savedState[key][field] = value;
  // Send incremental update to server (single format, not full state)
  const st = savedState[key];
  fetch('/update', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ format: key, status: st.status, notes: st.notes || '' })
  }).catch(e => console.error('[Save] Failed:', e));
  updateStats();
}

function statusClass(s) { return 's-' + s; }

const AUDIT_FAMILIES = new Set(['furnace-audit-nes', 'furnace-audit-gb']);

const AUDIT_STATUS_OPTIONS = ['untested','investigating','fixed','known-issue','wont-fix'];
const AUDIT_STATUS_COLORS = { untested: 'var(--dim)', investigating: '#22d3ee', fixed: 'var(--green)', 'known-issue': 'var(--yellow)', 'wont-fix': 'var(--dim)' };

function renderAuditTable(fmts) {
  const PASS_THRESHOLD = 0.90;
  let html = '<table><colgroup><col style="width:200px"><col style="width:80px"><col style="width:200px"><col style="width:70px"><col style="width:140px"><col></colgroup><tr><th>Song</th><th>Chips</th><th>EnvCorr (threshold 0.90)</th><th>Score</th><th>Status</th><th>Notes</th></tr>';
  fmts.forEach(f => {
    const st = savedState[f.key] || {};
    const envCorr = typeof st.envCorr === 'number' ? st.envCorr : null;
    const pass = envCorr !== null ? envCorr >= PASS_THRESHOLD : null;
    const passColor = pass === true ? 'var(--green)' : pass === false ? 'var(--red)' : 'var(--dim)';
    const passText = pass === true ? 'PASS' : pass === false ? 'FAIL' : '—';
    const barPct = envCorr !== null ? Math.max(0, Math.min(100, envCorr * 100)).toFixed(1) : 0;
    const barColor = envCorr === null ? 'var(--dim)' : envCorr >= PASS_THRESHOLD ? 'var(--green)' : envCorr >= 0.80 ? 'var(--yellow)' : 'var(--red)';
    const envLabel = envCorr !== null ? envCorr.toFixed(4) : '—';
    const rmsText = typeof st.rmsDbDiff === 'number' ? ` (${st.rmsDbDiff > 0 ? '+' : ''}${st.rmsDbDiff.toFixed(1)}dB)` : '';
    const barHtml = envCorr !== null ? `<div style="display:flex;align-items:center;gap:6px">
      <div style="flex:1;background:#1a2a4a;border-radius:3px;height:10px;position:relative">
        <div style="width:${barPct}%;background:${barColor};height:100%;border-radius:3px;min-width:2px"></div>
        <div style="position:absolute;left:${PASS_THRESHOLD * 100}%;top:-2px;width:2px;height:14px;background:#fff;opacity:0.4"></div>
      </div>
    </div>` : '<span style="color:var(--dim)">not tested</span>';
    const auditStatus = st.auditStatus || 'untested';
    const auditColor = AUDIT_STATUS_COLORS[auditStatus] || 'var(--dim)';
    html += `<tr data-key="${f.key}">
      <td class="fmt-label">${f.label}</td>
      <td class="ext" style="color:var(--purple);font-size:11px">${f.chips || '?'}</td>
      <td>${barHtml}<span style="color:${barColor};font-size:11px">${envLabel}${rmsText}</span></td>
      <td style="color:${passColor};font-weight:bold;font-size:12px">${passText}</td>
      <td><select class="status-select" style="color:${auditColor};border-color:${auditColor};width:130px" onchange="handleAuditStatus('${f.key}', this)">
        ${AUDIT_STATUS_OPTIONS.map(s => `<option value="${s}" ${s===auditStatus?'selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><input class="notes-input" value="${(st.notes||'').replace(/"/g,'&quot;')}" onchange="handleNotes('${f.key}', this)" placeholder="analysis notes..."></td>
    </tr>`;
  });
  html += '</table>';
  return html;
}

function renderTable(fmts, familyKey) {
  let html = '<table><colgroup><col style="width:180px"><col style="width:140px"><col style="width:100px"><col style="width:180px"><col style="width:140px"><col></colgroup><tr><th>Format</th><th>Key</th><th>Extensions</th><th>Backends</th><th>Status</th><th>Notes</th></tr>';
  fmts.forEach(f => {
    const st = getState(f.key);
    html += `<tr data-key="${f.key}">
      <td class="fmt-label">${f.label}</td>
      <td class="fmt-key">${f.key}</td>
      <td class="ext">${f.ext || '—'}</td>
      <td>${badges(f)}</td>
      <td><select class="status-select ${statusClass(st.status)}" onchange="handleStatus('${f.key}', this)">
        ${STATUS_OPTIONS.map(s => `<option value="${s}" ${s===st.status?'selected':''}>${s}</option>`).join('')}
      </select></td>
      <td><input class="notes-input" value="${(st.notes||'').replace(/"/g,'&quot;')}" onchange="handleNotes('${f.key}', this)" placeholder="Add notes..."></td>
    </tr>`;
  });
  html += '</table>';
  return html;
}

const collapsedFamilies = {};

function render() {
  const search = document.getElementById('search').value.toLowerCase();
  const filterStatus = document.getElementById('filterStatus').value;
  const filterFamily = document.getElementById('filterFamily').value;
  
  let html = '';
  const order = ['furnace-audit-nes','furnace-audit-gb','libopenmpt','furnace','amiga-native','pc-tracker','chip-dump','c64-chip','midi'];
  
  order.forEach(fam => {
    if (filterFamily && filterFamily !== fam) return;
    let fmts = families[fam] || [];
    
    if (search) {
      fmts = fmts.filter(f => 
        f.label.toLowerCase().includes(search) || 
        f.key.toLowerCase().includes(search) || 
        f.ext.toLowerCase().includes(search) ||
        (getState(f.key).notes||'').toLowerCase().includes(search)
      );
    }
    if (filterStatus) {
      fmts = fmts.filter(f => getState(f.key).status === filterStatus);
    }
    if (fmts.length === 0) return;
    
    const collapsed = collapsedFamilies[fam];
    html += `<div class="family-group">
      <div class="family-header" onclick="toggleFamily('${fam}')">
        <span>${collapsed ? '▶' : '▼'} ${familyLabels[fam] || fam}</span>
        <span class="family-count">${fmts.length} formats</span>
      </div>
      <div class="${collapsed ? 'hidden' : ''}">${AUDIT_FAMILIES.has(fam) ? renderAuditTable(fmts) : renderTable(fmts, fam)}</div>
    </div>`;
  });
  
  document.getElementById('content').innerHTML = html || '<p style="color:var(--dim);padding:20px;">No formats match your filters.</p>';
}

function toggleFamily(fam) {
  collapsedFamilies[fam] = !collapsedFamilies[fam];
  render();
}

function handleStatus(key, el) {
  setState(key, 'status', el.value);
  el.className = 'status-select ' + statusClass(el.value);
}

function handleNotes(key, el) {
  setState(key, 'notes', el.value);
}

function handleAuditStatus(key, el) {
  // Push auditStatus to server (stored alongside envCorr etc.)
  const st = savedState[key] || {};
  st.auditStatus = el.value;
  savedState[key] = st;
  el.style.color = AUDIT_STATUS_COLORS[el.value] || 'var(--dim)';
  el.style.borderColor = AUDIT_STATUS_COLORS[el.value] || 'var(--dim)';
  fetch('/update', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ format: key, auditStatus: el.value, notes: st.notes || '' })
  }).catch(e => console.error('[Save] Failed:', e));
}

function updateStats() {
  const counts = {};
  STATUS_OPTIONS.forEach(s => counts[s] = 0);
  const nonAuditFmts = FORMATS.filter(f => !AUDIT_FAMILIES.has(f.family));
  nonAuditFmts.forEach(f => counts[getState(f.key).status]++);

  // Audit pass/fail counts
  const PASS_THRESHOLD = 0.90;
  const auditFmts = FORMATS.filter(f => AUDIT_FAMILIES.has(f.family));
  let auditPass = 0, auditFail = 0, auditUntested = 0;
  auditFmts.forEach(f => {
    const st = savedState[f.key] || {};
    if (typeof st.envCorr === 'number') {
      if (st.envCorr >= PASS_THRESHOLD) auditPass++; else auditFail++;
    } else auditUntested++;
  });

  const colors = { untested: 'var(--dim)', works: 'var(--green)', partial: 'var(--yellow)', broken: 'var(--red)', silent: '#f97316', 'wrong-synth': 'var(--purple)', crashes: '#ef4444' };

  let html = '';
  STATUS_OPTIONS.forEach(s => {
    html += `<div class="stat"><div class="stat-val" style="color:${colors[s]}">${counts[s]}</div><div class="stat-label">${s}</div></div>`;
  });
  html += `<div class="stat"><div class="stat-val" style="color:var(--accent)">${nonAuditFmts.length}</div><div class="stat-label">formats</div></div>`;
  html += `<div class="stat"><div class="stat-val" style="color:var(--green)">${auditPass}</div><div class="stat-label">chip pass</div></div>`;
  html += `<div class="stat"><div class="stat-val" style="color:var(--red)">${auditFail}</div><div class="stat-label">chip fail</div></div>`;
  document.getElementById('stats').innerHTML = html;
}

function exportJSON() {
  const data = {};
  FORMATS.forEach(f => {
    const st = getState(f.key);
    if (st.status !== 'untested' || st.notes) {
      data[f.key] = st;
    }
  });
  const text = JSON.stringify(data, null, 2);
  document.getElementById('exportText').value = text;
  document.getElementById('exportArea').classList.remove('hidden');
  navigator.clipboard.writeText(text).then(() => showToast('JSON copied to clipboard!'));
}

function exportCSV() {
  let csv = 'key,label,family,status,notes\n';
  FORMATS.forEach(f => {
    const st = getState(f.key);
    csv += `${f.key},"${f.label}",${f.family},${st.status},"${(st.notes||'').replace(/"/g,'""')}"\n`;
  });
  document.getElementById('exportText').value = csv;
  document.getElementById('exportArea').classList.remove('hidden');
  navigator.clipboard.writeText(csv).then(() => showToast('CSV copied to clipboard!'));
}

function resetAll() {
  if (!confirm('Reset ALL statuses and notes? This cannot be undone.')) return;
  if (!confirm('Are you REALLY sure? This clears all server data too.')) return;
  savedState = {};
  render();
  updateStats();
  showToast('All data reset');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// Event listeners
document.getElementById('search').addEventListener('input', render);
document.getElementById('filterStatus').addEventListener('change', render);
document.getElementById('filterFamily').addEventListener('change', render);

// Initial render (data will arrive async from server, re-render then)
render();
updateStats();

// ─── Synth Tests ────────────────────────────────────────────────────────────

let synthTestResults = {}; // key: synthType → result object
let synthTestRunning = false;

// Suite labels for display
const SYNTH_SUITES = {
  tone: ['AMSynth','DuoSynth','FMSynth','MembraneSynth','MetalSynth','MonoSynth','NoiseSynth','PluckSynth','PolySynth','Synth'],
  custom: ['TB303','DubSiren','SpaceLaser','Synare','V2','Sam','Dexed','OBXd','SuperSaw','Organ','DrumMachine','ChipSynth','PWMSynth','WobbleBass','StringMachine','FormantSynth','GranularSynth','Wavetable'],
};
const SYNTH_SUITE_LABELS = { tone: 'Tone.js', custom: 'Custom', furnace: 'Furnace' };

function callBridge(method, params = {}) {
  return new Promise((resolve) => {
    let ws;
    try {
      ws = new WebSocket('ws://localhost:4003/mcp');
    } catch (e) {
      resolve({ error: 'WebSocket failed: ' + e.message });
      return;
    }
    const id = Math.random().toString(36).slice(2);
    const timer = setTimeout(() => { try { ws.close(); } catch {} resolve({ error: 'timeout' }); }, 120000);
    ws.onopen = () => ws.send(JSON.stringify({ id, type: 'call', method, params }));
    ws.onmessage = (e) => {
      clearTimeout(timer);
      try { resolve(JSON.parse(e.data)); } catch { resolve({ error: 'parse error' }); }
      ws.close();
    };
    ws.onerror = () => { clearTimeout(timer); resolve({ error: 'ws error' }); };
  });
}

async function runSynthSuite(suite) {
  if (synthTestRunning) return;
  synthTestRunning = true;

  const statusEl = document.getElementById('synth-run-status');
  const titleEl = document.getElementById('synth-title');
  titleEl.innerHTML = '<span class="running-indicator"></span>🎹 Synth Tests — running ' + (SYNTH_SUITE_LABELS[suite] || suite) + '...';
  statusEl.textContent = 'Connecting to DEViLBOX...';

  // Disable buttons
  ['btn-tone','btn-custom','btn-all'].forEach(id => document.getElementById(id).disabled = true);

  try {
    const timeout = suite === 'furnace' ? 10000 : suite === 'custom' ? 8000 : 5000;
    statusEl.textContent = 'Running tests (this may take a moment)...';
    const result = await callBridge('run_synth_tests', { suite, timeout });

    if (result.error) {
      statusEl.textContent = 'Error: ' + result.error + ' — is DEViLBOX open at localhost:5173?';
    } else {
      const data = result.data || result;
      const results = data.results || [];
      const ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : new Date().toLocaleTimeString();

      // Merge results into state
      results.forEach(r => { synthTestResults[r.synthType] = r; });

      // Save to server
      const updates = {};
      results.forEach(r => {
        updates['synth-' + r.synthType] = {
          status: r.loaded ? (r.producedSound && r.noteOnWorked ? 'works' : r.loaded ? 'partial' : 'broken') : 'broken',
          synthType: r.synthType,
          name: r.name,
          loaded: r.loaded,
          producedSound: r.producedSound,
          noteOnWorked: r.noteOnWorked,
          noteOffWorked: r.noteOffWorked,
          loadTimeMs: r.loadTimeMs,
          error: r.error || null,
          lastTestedAt: ts,
        };
      });
      fetch('/push-updates', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(updates),
      }).catch(() => {});

      const passed = results.filter(r => r.producedSound && r.noteOnWorked).length;
      statusEl.textContent = `Last run: ${ts} — ${passed}/${results.length} passed`;
      titleEl.textContent = '🎹 Synth Tests';
    }
  } catch (e) {
    statusEl.textContent = 'Error: ' + e.message;
    titleEl.textContent = '🎹 Synth Tests';
  }

  synthTestRunning = false;
  ['btn-tone','btn-custom','btn-all'].forEach(id => document.getElementById(id).disabled = false);
  renderSynthTests();
}

function renderSynthTests() {
  const el = document.getElementById('synth-test-table');
  const allResults = Object.values(synthTestResults);

  // Also check server state for previously saved synth test results
  const serverSynthKeys = Object.keys(savedState).filter(k => k.startsWith('synth-'));
  serverSynthKeys.forEach(k => {
    const st = savedState[k];
    if (st && st.synthType && !synthTestResults[st.synthType]) {
      synthTestResults[st.synthType] = st;
    }
  });

  const merged = Object.values(synthTestResults);
  if (merged.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:var(--dim);background:var(--card);border-radius:0 0 6px 6px;">No results yet — click a Run button above. Requires DEViLBOX open at <strong style="color:var(--text)">localhost:5173</strong>.</div>';
    return;
  }

  // Group by suite
  const tone = merged.filter(r => SYNTH_SUITES.tone.includes(r.synthType));
  const custom = merged.filter(r => SYNTH_SUITES.custom.includes(r.synthType));
  const other = merged.filter(r => !SYNTH_SUITES.tone.includes(r.synthType) && !SYNTH_SUITES.custom.includes(r.synthType));

  let html = '<table><colgroup><col style="width:160px"><col style="width:80px"><col style="width:70px"><col style="width:70px"><col style="width:70px"><col style="width:70px"><col style="width:80px"><col></colgroup>';
  html += '<tr><th>Synth</th><th>Suite</th><th>Loaded</th><th>Sound</th><th>Note On</th><th>Note Off</th><th>Load Time</th><th>Notes</th></tr>';

  const renderRow = (r) => {
    const suite = SYNTH_SUITES.tone.includes(r.synthType) ? 'Tone.js' : SYNTH_SUITES.custom.includes(r.synthType) ? 'Custom' : 'Other';
    const p = (v, label) => v === undefined || v === null ? `<span class="pill pill-skip">—</span>` :
      v ? `<span class="pill pill-pass">${label || '✓'}</span>` : `<span class="pill pill-fail">${label || '✗'}</span>`;
    const loadMs = r.loadTimeMs != null ? `${r.loadTimeMs < 1 ? '<1' : Math.round(r.loadTimeMs)}ms` : '—';
    const notes = r.error ? `<span style="color:var(--red);font-size:11px">${r.error}</span>` : (r.lastTestedAt ? `<span style="color:var(--dim);font-size:11px">${r.lastTestedAt}</span>` : '');
    return `<tr>
      <td class="fmt-label">${r.name || r.synthType}</td>
      <td><span class="badge badge-native" style="font-size:10px">${suite}</span></td>
      <td>${p(r.loaded)}</td>
      <td>${p(r.producedSound)}</td>
      <td>${p(r.noteOnWorked)}</td>
      <td>${p(r.noteOffWorked)}</td>
      <td style="color:var(--dim);font-size:11px">${loadMs}</td>
      <td>${notes}</td>
    </tr>`;
  };

  [...tone, ...custom, ...other].forEach(r => { html += renderRow(r); });
  html += '</table>';

  // Stats bar
  const total = merged.length;
  const passed = merged.filter(r => r.producedSound && r.noteOnWorked).length;
  const loaded = merged.filter(r => r.loaded).length;
  const failed = merged.filter(r => r.loaded && (!r.producedSound || !r.noteOnWorked)).length;
  html += `<div class="synth-stats">
    <span class="synth-stat-item" style="color:var(--green)">${passed} producing sound</span>
    <span class="synth-stat-item" style="color:var(--yellow)">${loaded - passed} loaded but silent</span>
    <span class="synth-stat-item" style="color:var(--red)">${total - loaded} failed to load</span>
    <span class="synth-stat-item" style="color:var(--dim)">${total} total tested</span>
  </div>`;

  el.innerHTML = html;
}

// Load any previously saved synth test results from server
function loadSynthResultsFromServer() {
  const synthKeys = Object.keys(savedState).filter(k => k.startsWith('synth-'));
  synthKeys.forEach(k => {
    const st = savedState[k];
    if (st && st.synthType) synthTestResults[st.synthType] = st;
  });
  if (Object.keys(synthTestResults).length > 0) renderSynthTests();
}

// Hook into the server data load to also populate synth results
const _origFetch = window._origSavedStateCb;
const _synthResultPoll = setInterval(() => {
  const synthKeys = Object.keys(savedState).filter(k => k.startsWith('synth-'));
  if (synthKeys.length > 0) {
    loadSynthResultsFromServer();
    clearInterval(_synthResultPoll);
  }
}, 500);

// Initial empty render
renderSynthTests();
</script>
