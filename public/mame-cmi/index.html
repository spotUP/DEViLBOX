<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fairlight CMI IIx — MAME Emulation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #33ff33;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    h1 {
      font-size: 14px;
      padding: 8px;
      color: #22cc22;
      letter-spacing: 2px;
    }
    #canvas-container {
      border: 2px solid #22cc22;
      box-shadow: 0 0 20px rgba(0, 255, 0, 0.15);
      position: relative;
    }
    canvas {
      display: block;
      width: 1024px;
      height: 512px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #status {
      padding: 8px;
      font-size: 12px;
      color: #22cc22;
    }
    #output {
      width: 1024px;
      max-width: 95vw;
      height: 120px;
      background: #0a0a0a;
      color: #22cc22;
      border: 1px solid #22cc22;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      margin-top: 8px;
      padding: 4px;
      overflow-y: auto;
    }
    .controls {
      padding: 8px;
      font-size: 12px;
    }
    .controls button {
      background: #0a0a0a;
      color: #33ff33;
      border: 1px solid #22cc22;
      padding: 4px 12px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      margin: 0 4px;
    }
    .controls button:hover {
      background: #1a3a1a;
    }
  </style>
</head>
<body>
  <h1>FAIRLIGHT CMI IIx — MAME EMULATION</h1>
  <div id="status">Initializing...</div>
  <div id="canvas-container">
    <canvas id="canvas" width="512" height="256" tabindex="1"
      oncontextmenu="event.preventDefault()"></canvas>
  </div>
  <div class="controls">
    <button onclick="unlockAudio()">🔊 ENABLE AUDIO</button>
    <button onclick="JSMAME && JSMAME.soft_reset()">SOFT RESET</button>
    <button onclick="JSMAME && JSMAME.hard_reset()">HARD RESET</button>
    <button onclick="toggleFullscreen()">FULLSCREEN</button>
    <button onclick="saveAndDownload()">SAVE STATE</button>
    <button onclick="JSMAME && JSMAME.load('cmi_boot')">LOAD STATE</button>
  </div>
  <textarea id="output" readonly></textarea>

  <script>
    // MAME control API — wired up after Module loads
    var JSMAME = null;
    function initJSMAME() {
      if (!Module || !Module.cwrap) return;
      JSMAME = {
        save: Module.cwrap('mame_save_state', null, ['string']),
        load: Module.cwrap('mame_load_state', null, ['string']),
        soft_reset: Module.cwrap('mame_soft_reset', null, []),
        hard_reset: Module.cwrap('mame_hard_reset', null, [])
      };
      log('JSMAME API ready');
    }

    function saveAndDownload() {
      if (!JSMAME) { log('MAME not ready'); return; }
      JSMAME.save('cmi_boot');
      // The save happens on next frame; download the file after a delay
      setTimeout(function() {
        try {
          var data = FS.readFile('/sta/cmi2x/cmi_boot.sta');
          var blob = new Blob([data], {type: 'application/octet-stream'});
          var a = document.createElement('a');
          a.href = URL.createObjectURL(blob);
          a.download = 'cmi_boot.sta';
          a.click();
          log('Save state downloaded (' + data.length + ' bytes)');
        } catch(e) { log('Save state file not ready: ' + e); }
      }, 500);
    }

    function unlockAudio() {
      // Emscripten SDL audio uses a global AudioContext
      // Resume it on user gesture, and also unpause SDL audio
      var ctx = typeof SDL2 !== 'undefined' && SDL2.audioContext ? SDL2.audioContext :
                typeof SDL !== 'undefined' && SDL.audioContext ? SDL.audioContext : null;
      if (ctx) {
        ctx.resume().then(function() {
          log('AudioContext resumed: ' + ctx.state);
        });
      }
      // Also try Module._SDL_PauseAudio(0) to unpause
      if (Module && Module._SDL_PauseAudio) {
        Module._SDL_PauseAudio(0);
        log('SDL audio unpaused');
      }
      // Try to find and resume any AudioContext
      if (!ctx && window.AudioContext) {
        // Emscripten may have created one
        log('Looking for AudioContext...');
      }
    }

    // Auto-unlock audio on first click anywhere
    document.addEventListener('click', function audioUnlock() {
      unlockAudio();
      document.removeEventListener('click', audioUnlock);
    }, { once: true });

    function log(msg) {
      var el = document.getElementById('output');
      el.value += msg + '\n';
      el.scrollTop = el.scrollHeight;
      console.log('[CMI]', msg);
    }

    function setStatus(msg) {
      document.getElementById('status').textContent = msg;
      log(msg);
    }

    function toggleFullscreen() {
      var c = document.getElementById('canvas-container');
      if (c.requestFullscreen) c.requestFullscreen();
    }

    // ROM file manifest
    var ROM_FILES = [
      'brom.bin', 'cmikeys4.bin', 'dqfc911.bin', 'f8lmrk5.bin',
      'kbdioa.bin', 'mon1110e.bin', 'mon1110o.bin', 'mrom.bin',
      'q9f0mrk1.bin', 'srom.bin', 'timrom.bin', 'velkeysd.bin', 'wrom.bin'
    ];

    // Pre-fetch all ROM data BEFORE loading mame.js
    // This avoids all async-in-preRun timing issues
    var preloadedData = {};

    async function fetchBinary(url) {
      var resp = await fetch(url);
      if (!resp.ok) throw new Error('Failed to fetch ' + url + ': ' + resp.status);
      return new Uint8Array(await resp.arrayBuffer());
    }

    async function preloadAllFiles() {
      setStatus('Downloading ROM files...');

      // Fetch all ROMs in parallel
      var romResults = await Promise.all(ROM_FILES.map(async function(name) {
        var data = await fetchBinary('roms/' + name);
        log('  ROM: ' + name + ' (' + data.length + ' bytes)');
        return { name: name, data: data };
      }));

      romResults.forEach(function(r) {
        preloadedData[r.name] = r.data;
      });

      // Fetch system disk
      setStatus('Downloading system disk...');
      preloadedData['SYSV19.IMD'] = await fetchBinary('SYSV19.IMD');
      log('  DISK: SYSV19.IMD (' + preloadedData['SYSV19.IMD'].length + ' bytes)');

      log('All files downloaded (' + (ROM_FILES.length + 1) + ' files)');
    }

    async function startMAME() {
      try {
        await preloadAllFiles();
      } catch(err) {
        setStatus('ERROR: Failed to download files: ' + err.message);
        return;
      }

      // Set up Emscripten Module with SYNCHRONOUS preRun
      // All data is already in preloadedData, no async needed
      window.Module = {
        noExitRuntime: true,
        canvas: document.getElementById('canvas'),
        onRuntimeInitialized: function() { setTimeout(initJSMAME, 1000); },

        arguments: ['cmi2x', '-rompath', '/roms', '-window', '-nomaximize',
                    '-resolution', '512x256', '-prescale', '1', '-nofilter',
                    '-mouse', '-lightgun',
                    '-verbose',
                    '-floppydisk1', '/disks/SYSV19.IMD'],

        print: function(text) { log(text); },
        printErr: function(text) { log('[ERR] ' + text); },

        setStatus: function(text) {
          if (text) setStatus(text);
        },

        monitorRunDependencies: function(left) {
          if (left === 0) setStatus('All dependencies loaded, starting emulation...');
          else setStatus('Loading... (' + left + ' remaining)');
        },

        // SYNCHRONOUS preRun — all data already fetched
        // Emscripten creates global FS; Module.FS is NOT available in newer Emscripten
        preRun: [function(mod) {
          setStatus('Writing files to virtual filesystem...');
          // In Emscripten 4.x, FS is a global variable, not on Module
          var fs = window.FS;

          // Create directory structure
          try { fs.mkdir('/roms'); } catch(e) {}
          try { fs.mkdir('/roms/cmi2x'); } catch(e) {}
          try { fs.mkdir('/roms/cmi_mkbd'); } catch(e) {}
          try { fs.mkdir('/roms/cmi_ankbd'); } catch(e) {}
          try { fs.mkdir('/disks'); } catch(e) {}

          // Write ROM files — write to cmi2x AND child device dirs
          ROM_FILES.forEach(function(name) {
            var data = preloadedData[name];
            if (!data) {
              log('  ERROR: preloadedData["' + name + '"] is undefined!');
              return;
            }
            fs.writeFile('/roms/cmi2x/' + name, data);
            log('  FS: /roms/cmi2x/' + name + ' (' + data.length + ' bytes)');
          });

          // Also write keyboard ROMs to their own dirs (MAME looks there first)
          if (preloadedData['velkeysd.bin']) {
            fs.writeFile('/roms/cmi_mkbd/velkeysd.bin', preloadedData['velkeysd.bin']);
            fs.writeFile('/roms/cmi_mkbd/kbdioa.bin', preloadedData['kbdioa.bin']);
          }
          if (preloadedData['cmikeys4.bin']) {
            fs.writeFile('/roms/cmi_ankbd/cmikeys4.bin', preloadedData['cmikeys4.bin']);
          }

          // Write system disk
          fs.writeFile('/disks/SYSV19.IMD', preloadedData['SYSV19.IMD']);
          log('  FS: /disks/SYSV19.IMD (' + preloadedData['SYSV19.IMD'].length + ' bytes)');

          log('All files written to virtual filesystem');
          setStatus('Starting MAME emulation...');
        }],

        totalDependencies: 0,
      };

      // NOW load mame.js — Module is ready with all data
      setStatus('Loading MAME engine...');
      var script = document.createElement('script');
      script.src = 'cmi.js';
      document.body.appendChild(script);
    }

    // Start the whole process
    startMAME();
  </script>
</body>
</html>
