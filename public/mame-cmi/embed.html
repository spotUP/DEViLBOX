<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0a; overflow: hidden; }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #loading {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #22cc22; font-family: 'Courier New', monospace; font-size: 12px;
      z-index: 10; background: #0a0a0a;
    }
    #loading .bar { width: 200px; height: 4px; background: #1a3a1a; margin-top: 8px; border-radius: 2px; }
    #loading .bar-fill { height: 100%; background: #22cc22; width: 0%; transition: width 0.2s; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="loading">
    <div id="status">LOADING CMI FIRMWARE...</div>
    <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
  </div>
  <canvas id="canvas" width="512" height="256" tabindex="1"
    oncontextmenu="event.preventDefault()"></canvas>

  <script>
    var ROM_FILES = [
      'brom.bin', 'cmikeys4.bin', 'dqfc911.bin', 'f8lmrk5.bin',
      'kbdioa.bin', 'mon1110e.bin', 'mon1110o.bin', 'mrom.bin',
      'q9f0mrk1.bin', 'srom.bin', 'timrom.bin', 'velkeysd.bin', 'wrom.bin'
    ];
    var preloadedData = {};
    var totalFiles = ROM_FILES.length + 1;
    var loaded = 0;

    function setStatus(msg) {
      var el = document.getElementById('status');
      if (el) el.textContent = msg;
    }

    function updateBar() {
      loaded++;
      var el = document.getElementById('bar-fill');
      if (el) el.style.width = Math.round((loaded / totalFiles) * 100) + '%';
    }

    async function fetchBinary(url) {
      var resp = await fetch(url);
      if (!resp.ok) throw new Error('Failed: ' + url);
      return new Uint8Array(await resp.arrayBuffer());
    }

    function unlockAudio() {
      var ctx = typeof SDL2 !== 'undefined' && SDL2.audioContext ? SDL2.audioContext :
                typeof SDL !== 'undefined' && SDL.audioContext ? SDL.audioContext : null;
      if (ctx) ctx.resume();
      if (Module && Module._SDL_PauseAudio) Module._SDL_PauseAudio(0);
    }

    document.addEventListener('click', function u() {
      unlockAudio();
      document.removeEventListener('click', u);
    }, { once: true });

    // Listen for parent postMessage commands
    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.type) return;
      if (e.data.type === 'cmi-reset' && window.JSMAME) {
        JSMAME.soft_reset();
      }
    });

    async function boot() {
      try {
        setStatus('DOWNLOADING ROMS...');
        var romResults = await Promise.all(ROM_FILES.map(async function(name) {
          var data = await fetchBinary('roms/' + name);
          updateBar();
          return { name: name, data: data };
        }));
        romResults.forEach(function(r) { preloadedData[r.name] = r.data; });

        setStatus('DOWNLOADING SYSTEM DISK...');
        preloadedData['SYSV19.IMD'] = await fetchBinary('SYSV19.IMD');
        updateBar();

        setStatus('BOOTING CMI...');
      } catch(err) {
        setStatus('ERROR: ' + err.message);
        return;
      }

      window.Module = {
        noExitRuntime: true,
        canvas: document.getElementById('canvas'),
        onRuntimeInitialized: function() {
          setTimeout(function() {
            if (Module && Module.cwrap) {
              window.JSMAME = {
                soft_reset: Module.cwrap('mame_soft_reset', null, []),
                hard_reset: Module.cwrap('mame_hard_reset', null, []),
              };
            }
            // Hide loading overlay
            var ld = document.getElementById('loading');
            if (ld) ld.style.display = 'none';
            // Notify parent
            window.parent.postMessage({ type: 'cmi-ready' }, '*');
          }, 1000);
        },
        arguments: ['cmi2x', '-rompath', '/roms', '-window', '-nomaximize',
                     '-resolution', '512x256', '-prescale', '1', '-nofilter',
                     '-mouse', '-lightgun',
                     '-floppydisk1', '/disks/SYSV19.IMD'],
        print: function() {},
        printErr: function() {},
        setStatus: function(text) { if (text) setStatus(text); },
        monitorRunDependencies: function() {},
        preRun: [function() {
          var fs = window.FS;
          try { fs.mkdir('/roms'); } catch(e) {}
          try { fs.mkdir('/roms/cmi2x'); } catch(e) {}
          try { fs.mkdir('/roms/cmi_mkbd'); } catch(e) {}
          try { fs.mkdir('/roms/cmi_ankbd'); } catch(e) {}
          try { fs.mkdir('/disks'); } catch(e) {}
          ROM_FILES.forEach(function(name) {
            var data = preloadedData[name];
            if (!data) return;
            fs.writeFile('/roms/cmi2x/' + name, data);
          });
          if (preloadedData['velkeysd.bin']) {
            fs.writeFile('/roms/cmi_mkbd/velkeysd.bin', preloadedData['velkeysd.bin']);
            fs.writeFile('/roms/cmi_mkbd/kbdioa.bin', preloadedData['kbdioa.bin']);
          }
          if (preloadedData['cmikeys4.bin'])
            fs.writeFile('/roms/cmi_ankbd/cmikeys4.bin', preloadedData['cmikeys4.bin']);
          fs.writeFile('/disks/SYSV19.IMD', preloadedData['SYSV19.IMD']);
        }],
        totalDependencies: 0,
      };

      var script = document.createElement('script');
      script.src = 'cmi.js';
      document.body.appendChild(script);
    }

    boot();
  </script>
</body>
</html>
