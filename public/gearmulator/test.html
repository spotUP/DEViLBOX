<!DOCTYPE html>
<html>
<head>
  <title>Gearmulator WASM Test</title>
  <style>
    body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
    #log { white-space: pre-wrap; font-size: 12px; max-height: 80vh; overflow-y: auto; }
    button { font-size: 16px; padding: 8px 16px; margin: 4px; }
  </style>
</head>
<body>
  <h2>Gearmulator WASM Direct Test</h2>
  <div>
    <button onclick="init()">1. Init</button>
    <button onclick="sendNote()">2. Send Note</button>
    <button onclick="stop()">3. Stop</button>
  </div>
  <div id="status">Not started</div>
  <div id="log"></div>
  <script>
    const HEADER_BYTES = 16;
    const HEADER_INTS = HEADER_BYTES / 4;
    const RING_FRAMES = 8192;

    let worker = null;
    let sab = null;
    let sabInt32 = null;
    let sabFloat32 = null;
    let monitorInterval = null;
    let startTime = 0;

    function log(msg) {
      const el = document.getElementById('log');
      const t = ((Date.now() - startTime) / 1000).toFixed(1);
      el.textContent = `[${t}s] ${msg}\n` + el.textContent;
      console.log(msg);
    }

    function setStatus(s) { document.getElementById('status').textContent = s; }

    async function init() {
      startTime = Date.now();
      setStatus('Loading ROM...');

      // Fetch ROM (Virus B 512KB)
      const romPath = '/roms/gearmulator/extracted/Access Virus B (am29f040b_4v9).BIN';
      log('Fetching ROM...');
      const romResp = await fetch(romPath);
      if (!romResp.ok) {
        log(`ERROR: ROM not found at ${romPath}`);
        return;
      }
      const romData = await romResp.arrayBuffer();
      log(`ROM loaded: ${romData.byteLength} bytes (${(romData.byteLength/1024).toFixed(0)}KB)`);

      // Fetch WASM binary
      log('Fetching WASM binary...');
      const wasmResp = await fetch('/gearmulator/gearmulator_wasm.wasm');
      const wasmBinary = await wasmResp.arrayBuffer();
      log(`WASM loaded: ${wasmBinary.byteLength} bytes (${(wasmBinary.byteLength/1024).toFixed(0)}KB)`);

      // Create SAB
      const sabSize = HEADER_BYTES + RING_FRAMES * 2 * 4;
      sab = new SharedArrayBuffer(sabSize);
      sabInt32 = new Int32Array(sab);
      sabFloat32 = new Float32Array(sab);
      log(`SAB created: ${sabSize} bytes`);

      // Create worker
      worker = new Worker('/gearmulator/Gearmulator.worker.js');
      worker.onmessage = (e) => {
        const d = e.data;
        if (d.type === 'ready') {
          log(`READY! handle=${d.handle}, sampleRate=${d.sampleRate}`);
          setStatus('Ready - DSP running');
          startMonitor();
        } else if (d.type === 'error') {
          log(`ERROR: ${d.message}`);
          setStatus('ERROR: ' + d.message);
        } else {
          log(`msg: ${JSON.stringify(d)}`);
        }
      };
      worker.onerror = (e) => {
        log(`WORKER ERROR: ${e.message}`);
        setStatus('WORKER CRASHED');
      };

      // Send init
      setStatus('Initializing WASM...');
      worker.postMessage({
        type: 'init',
        sampleRate: 44100,
        wasmBinary: wasmBinary,
        jsCode: null,
        romData: romData,
        synthType: 0,
        sab: sab,
      }, [wasmBinary, romData]);
      log('Init message sent (wasmBinary + romData transferred)');
    }

    function startMonitor() {
      let lastWrite = -1;
      let stuckCount = 0;
      let seconds = 0;

      monitorInterval = setInterval(() => {
        seconds++;
        const writePos = Atomics.load(sabInt32, 0);
        const readPos = Atomics.load(sabInt32, 1);
        const bufSize = Atomics.load(sabInt32, 2);
        let used = writePos - readPos;
        if (used < 0) used += bufSize;

        // Find peak
        let peak = 0;
        for (let i = 0; i < bufSize * 2; i++) {
          const v = Math.abs(sabFloat32[HEADER_INTS + i]);
          if (v > peak) peak = v;
        }

        log(`[t=${seconds}s] write=${writePos} used=${used}/${bufSize} peak=${peak.toFixed(6)}`);

        if (writePos === lastWrite) {
          stuckCount++;
          if (stuckCount >= 3) {
            log('STUCK - worker may have crashed');
            setStatus('CRASHED - write position stuck');
          }
        } else {
          stuckCount = 0;
        }
        lastWrite = writePos;
      }, 1000);
    }

    function sendNote() {
      if (!worker) return;
      log('Sending noteOn C3 vel=100');
      worker.postMessage({ type: 'noteOn', note: 60, velocity: 100, channel: 0 });
      setTimeout(() => {
        log('Sending noteOff C3');
        worker.postMessage({ type: 'noteOff', note: 60, channel: 0 });
      }, 2000);
    }

    function stop() {
      if (monitorInterval) clearInterval(monitorInterval);
      if (worker) worker.postMessage({ type: 'dispose' });
      setStatus('Stopped');
      log('Stopped');
    }
  </script>
</body>
</html>
